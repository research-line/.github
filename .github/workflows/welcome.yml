name: 'Welcome new contributors'
on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue! We appreciate your contribution.
            Please check our [Contributing Guide](https://github.com/research-line/.github/blob/main/CONTRIBUTING.md) for more information.
          pr-message: |
            Thanks for your first pull request! A maintainer will review it soon.
            Please make sure you've read our [Contributing Guide](https://github.com/research-line/.github/blob/main/CONTRIBUTING.md).
